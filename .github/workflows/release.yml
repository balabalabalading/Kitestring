name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to publish assets to
        required: true
        default: v0.1.1

permissions:
  contents: write

jobs:
  windows:
    name: Windows 安装包
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 构建并上传 Windows 安装包
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag_name }}
          releaseName: "${{ inputs.tag_name }} Early Preview"
          releaseDraft: false
          prerelease: true
          args: --bundles nsis,msi

  linux:
    name: Linux 安装包
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖（Tauri）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            libfuse2

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 构建并上传 Linux 安装包
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag_name }}
          releaseName: "${{ inputs.tag_name }} Early Preview"
          releaseDraft: false
          prerelease: true
          args: --bundles deb,rpm,appimage
