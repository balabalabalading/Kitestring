name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows 安装包
    runs-on: windows-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 生成发布版本
        id: release_meta
        shell: bash
        run: echo "tag_name=v$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: 生成发布日志
        id: release_notes
        shell: bash
        run: |
          body="$(node .github/release/render-notes.mjs --format release --version "${{ steps.release_meta.outputs.tag_name }}")"
          delimiter="release-notes-$RANDOM-$RANDOM"
          echo "body<<$delimiter" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "$delimiter" >> "$GITHUB_OUTPUT"

      - name: 构建并上传 Windows 安装包
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release_meta.outputs.tag_name }}
          releaseName: "${{ steps.release_meta.outputs.tag_name }} Early Preview"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --bundles nsis,msi

  linux:
    name: Linux 安装包
    needs: windows
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖（Tauri）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            libfuse2

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 生成发布日志
        id: release_notes
        shell: bash
        run: |
          body="$(node .github/release/render-notes.mjs --format release --version "${{ needs.windows.outputs.tag_name }}")"
          delimiter="release-notes-$RANDOM-$RANDOM"
          echo "body<<$delimiter" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "$delimiter" >> "$GITHUB_OUTPUT"

      - name: 构建并上传 Linux 安装包
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.windows.outputs.tag_name }}
          releaseName: "${{ needs.windows.outputs.tag_name }} Early Preview"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --bundles deb,rpm,appimage
