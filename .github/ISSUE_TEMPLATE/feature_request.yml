name: 功能请求
description: 建议新功能或改进
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你希望实现的功能。

  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 你遇到了什么问题，或者有什么使用场景让你想到这个功能？
      placeholder: 我在使用时发现 xxx 不够方便，希望能...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述你希望的功能如何工作
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 功能领域
      options:
        - Skill 导入
        - Skill 分发
        - 项目管理
        - Skill Preset
        - 外部 Skill 平台集成
        - 设置 / 诊断
        - 菜单栏 / 系统托盘
        - 文档
        - 其他

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 你是否考虑过其他解决方式？

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 任何有助于理解需求的截图或参考资料
