name: Bug 报告
description: 报告一个 bug 或异常行为
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的反馈！请尽量详细描述问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰描述遇到的问题
      placeholder: 当我执行 xxx 操作时，发生了 xxx 错误...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现此问题
      placeholder: |
        1. 打开应用
        2. 点击 xxx
        3. 看到错误 xxx
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你认为应该发生什么
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 应用版本
      placeholder: 例如：0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - macOS
        - Windows
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 截图、日志或其他相关信息
